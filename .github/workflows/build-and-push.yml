###############################################################################
# .github/workflows/build-and-push.yml
#
# Builds and pushes the openrelik-pipeline Docker image (YOUR FORK — Tier 1).
# Drop this file into your forked openrelik-pipeline repo at:
#   .github/workflows/build-and-push.yml
#
# After a successful push this workflow:
#   - Outputs the image digest to the Actions log
#   - Optionally opens a PR to update OPENRELIK_PIPELINE_VERSION in config.env
#
# Required repo settings:
#   Settings → Actions → General → Workflow permissions → Read and write
###############################################################################

name: Build and Push — Pipeline Image (Tier 1)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "20[0-9][0-9].[0-9][0-9].[0-9][0-9]"

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to registry?"
        required: false
        default: "true"
        type: boolean

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME is computed dynamically as lowercase in each job (see 'Lowercase image name' step)
  # This avoids GHCR parse errors caused by mixed-case org names like CYPFER-Inc
  # Set to "true" only if GitHub Advanced Security is enabled on this repo (paid feature for private repos)
  UPLOAD_SARIF: "false"  

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and push the pipeline image
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
      image-version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lowercase image name
        id: image-name
        env:
          REPO: ${{ github.repository }}
        run: echo "value=$(echo $REPO | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.value }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' && github.event.inputs.push_image != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance and SBOM attestations for supply chain transparency
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Log digest to summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ steps.image-name.outputs.value }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> To pin this exact build in docker-compose.yml:" >> $GITHUB_STEP_SUMMARY
          echo "> \`image: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.value }}@${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job 2: Trivy scan the newly built image before it reaches production
  # ---------------------------------------------------------------------------
  scan-built-image:
    name: Scan Built Image
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request' && needs.build-and-push.outputs.image-digest != ''

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lowercase image name
        id: image-name
        env:
          REPO: ${{ github.repository }}
        run: echo "value=$(echo $REPO | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan with Trivy
        id: trivy-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ steps.image-name.outputs.value }}@${{ needs.build-and-push.outputs.image-digest }}"
          format: sarif
          output: trivy-pipeline-build.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Check SARIF file exists
        id: check-sarif
        if: always()
        run: |
          if [ -f "trivy-pipeline-build.sarif" ]; then
            echo "sarif_exists=true" >> $GITHUB_OUTPUT
          else
            echo "sarif_exists=false" >> $GITHUB_OUTPUT
            echo "SARIF file not created — skipping upload"
          fi

      - name: Upload SARIF
        if: always() && steps.check-sarif.outputs.sarif_exists == 'true' && env.UPLOAD_SARIF == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-pipeline-build.sarif
          category: trivy-pipeline-build

      - name: Fail if CVEs found
        if: steps.trivy-scan.outcome == 'failure'
        run: |
          echo "Trivy scan found CRITICAL or HIGH CVEs — see Security tab for details"
          exit 1

  # ---------------------------------------------------------------------------
  # Job 3: Upstream sync (weekly schedule / manual only)
  # ---------------------------------------------------------------------------
  sync-upstream:
    name: Sync from Upstream (DDI)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync from Digital-Defense-Institute/openrelik-pipeline
        run: |
          git remote add upstream https://github.com/Digital-Defense-Institute/openrelik-pipeline.git || true
          git fetch upstream

          if git merge upstream/main --no-edit --allow-unrelated-histories; then
            echo "✅ Clean merge from upstream"
            git push origin main
          else
            BRANCH="upstream-sync-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "${BRANCH}"
            git add -A
            git commit -m "chore: upstream sync — conflicts need manual resolution $(date +%Y-%m-%d)" || true
            git push origin "${BRANCH}"
            echo "⚠️  Conflicts — created branch ${BRANCH} for manual review"
          fi
