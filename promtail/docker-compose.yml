# Promtail inside a case container — ships all Docker stdout to Loki
# on services-1 with a `case=<CASE_ID>` label.
#
# Deployed by install.sh's deploy_promtail() on prod case containers
# only (gated by ENVIRONMENT=prod + LOKI_URL set). Dev deployments
# skip Promtail entirely.
#
# This is the *plumbing* stack — every Docker container's stdout
# lands in Loki tagged with the case ID. App-specific parsing
# (VR server.journal.tsv, OR workflow lifecycle, TS DB sidecar)
# lands in later PRs that extend this config.

services:
  promtail:
    container_name: case-promtail
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      # Docker service discovery + log file access for all containers
      # running in this case (timesketch, openrelik, velociraptor,
      # openrelik-pipeline, …).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Velociraptor data directory on the LXC host. The vr_data/logs/
      # subdir holds per-component audit trails we tail here:
      #   VelociraptorAudit_info.log   — hunt creation, flow uploads,
      #                                  monitoring state changes, user auth
      #   VelociraptorAudit_error.log  — audit-class failures (auth deny, etc.)
      # Both are JSON-per-line. Rotated archives (*.log.YYYYMMDDHHMM) are
      # not tailed — the scrape glob deliberately excludes date-suffixed
      # files so Promtail doesn't double-ingest historical windows.
      # (The old /opt/vr_data mount from PR #17 was wrong — that path is
      # empty on the LXC host; VR writes inside /opt/velociraptor/.)
      - /opt/velociraptor/vr_data:/opt/velociraptor/vr_data:ro
      # install.sh structured audit trail (install-start/error/complete).
      # install.audit.log is JSON-per-line; rotated master install.log in
      # the same dir is also available if a future PR wants to ship it.
      - /opt/openrelik-pipeline/logs:/opt/openrelik-pipeline/logs:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
      - ./positions:/positions
    # Scratch image has no wget/curl — bind health port on localhost
    # so the install.sh deploy function can probe /ready.
    ports:
      - "127.0.0.1:9080:9080"
