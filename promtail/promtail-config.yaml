# Promtail config for a case container.
# __LOKI_URL__ and __CASE_ID__ are substituted by install.sh at deploy time.
#
# Every Docker container on this LXC gets auto-discovered and its
# stdout shipped to Loki with:
#   source=case-container  class=ops
#   case=<CASE_ID>  host=case-<CASE_ID>
#   container=<docker-name>  compose_project=<...>  compose_service=<...>
#
# Audit-class parsing (source-specific) is added in follow-up PRs.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /positions/positions.yaml

clients:
  - url: __LOKI_URL__/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  # All Docker containers on the case LXC
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - target_label: 'job'
        replacement: 'docker'
      - target_label: 'case'
        replacement: '__CASE_ID__'
      - target_label: 'host'
        replacement: 'case-__CASE_ID__'
      - target_label: 'source'
        replacement: 'case-container'
      - target_label: 'class'
        replacement: 'ops'

  # Velociraptor audit log — chain-of-custody for VR operations.
  # VR writes JSON-per-line to /opt/vr_data/logs/VelociraptorAudit_{info,error}.log
  # inside the container (= /opt/velociraptor/vr_data/logs/ on the host,
  # bind-mounted by the compose file).
  # Fields seen in practice:
  #   time         — RFC3339 timestamp
  #   principal    — VR username who performed the action
  #   operation    — e.g. CreateHunt, SetServerMonitoringState, client ops
  #   msg          — usually mirrors operation
  #   level        — info | error (also distinguishable via the filename)
  #   details      — operation-specific nested object (stays in log body)
  #
  # __path__ uses the bare `.log` glob so rotated archives
  # (VelociraptorAudit_info.log.202604130000) are NOT re-ingested.
  - job_name: velociraptor-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: velociraptor-audit
          case: __CASE_ID__
          host: case-__CASE_ID__
          source: velociraptor
          class: audit
          __path__: /opt/velociraptor/vr_data/logs/VelociraptorAudit_*.log
    pipeline_stages:
      - json:
          expressions:
            ts: time
            principal: principal
            operation: operation
            level: level
      # Derive verdict from filename: *_info.log → ok, *_error.log → error
      - regex:
          expression: 'VelociraptorAudit_(?P<verdict_from_file>info|error)\.log$'
          source: filename
      # Prefer the file-based verdict; fall back to level if missing.
      - template:
          source: verdict_final
          template: '{{ or .verdict_from_file .level "ok" }}'
      # Normalize "info" → "ok" to match the unified schema's verdict set.
      - template:
          source: verdict_final
          template: '{{ if eq .verdict_final "info" }}ok{{ else }}{{ .verdict_final }}{{ end }}'
      # Use the event's own timestamp so backlogged lines land on the
      # right Grafana timeline, not Promtail ingest time.
      - timestamp:
          source: ts
          format: RFC3339
      # Promote to unified-schema labels. `source`, `class`, `case`, `host`
      # are already set statically above.
      - labels:
          actor: principal
          action: operation
          verdict: verdict_final
