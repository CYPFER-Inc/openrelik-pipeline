###############################################################################
# docker-compose.yml — openrelik-pipeline
# 
# This file manages ONLY the pipeline container.
# Timesketch, OpenRelik, and Velociraptor are deployed separately
# by install.sh and managed in their own compose stacks.
###############################################################################

services:

  openrelik-pipeline:
    container_name: openrelik-pipeline
    image: ghcr.io/cypfer-inc/openrelik-pipeline:latest
    restart: always
    ports:
      - "0.0.0.0:5000:5000"
    environment:
      - OPENRELIK_SERVER_URL=http://openrelik-server:8710
      - OPENRELIK_API_KEY=YOUR_API_KEY
    volumes:
      - /opt/openrelik/data:/usr/share/openrelik/data
    networks:
      - openrelik_default

networks:
  openrelik_default:
    external: true
